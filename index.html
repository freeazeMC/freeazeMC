<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NodeGuard - İlanlar</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .ilan-karti { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Yayındaki İlanlar</h1>
    <div id="ilanListesi"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // BURAYA FIREBASE CONFIG BİLGİNİ YAZ
        const app = initializeApp({ /* ... */ });
        const db = getFirestore(app);

        onSnapshot(collection(db, "ilanlar"), (snapshot) => {
            const liste = document.getElementById('ilanListesi');
            liste.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                liste.innerHTML += `<div class="ilan-karti"><b>${data.isim}</b><br>${data.aciklama}<br>WhatsApp: ${data.tel}</div>`;
            });
        });
    </script>
</body>
</html>
