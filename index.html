<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NodeGuard | İlan & Destek Pazarı</title>
    <style>
        /* Tasarım - Dark Mode */
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .vpn-alert { background: #e74c3c; padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid #c0392b; }
        .nav { background: #1e1e1e; padding: 15px; display: flex; justify-content: center; gap: 15px; }
        button { background: #333; color: white; padding: 10px 20px; border: 1px solid #444; border-radius: 5px; cursor: pointer; }
        button:hover { background: #444; }
        
        .container { max-width: 700px; margin: 20px auto; padding: 20px; }
        .card { background: #252525; padding: 20px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-green { background: #27ae60; border: none; font-weight: bold; width: 100%; padding: 12px; cursor: pointer; margin-top: 10px; }
        .btn-green:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="vpn-alert">⚠ Discord entegrasyonu ve Firebase erişimi için VPN kullanmanız önerilir!</div>

    <div class="nav">
        <button onclick="show('ilanlar')">İlan Pazarı</button>
        <button onclick="show('ekle')">İlan Ekle</button>
        <button onclick="show('destek')">Destek / Şikayet</button>
    </div>

    <div class="container">
        <!-- İlan Pazarı -->
        <div id="ilanlar">
            <h2>İlan Pazarı</h2>
            <div id="ilanListesi">Veriler yükleniyor...</div>
        </div>

        <!-- İlan Ekleme -->
        <div id="ekle" style="display:none;">
            <h2>İlan Oluştur</h2>
            <input type="text" id="isim" placeholder="İlan İsmi">
            <input type="text" id="tel" placeholder="WhatsApp Numaranız">
            <textarea id="aciklama" placeholder="İlan Açıklaması (Takas detayları)"></textarea>
            <button class="btn-green" onclick="submitIlan()">İlanı Yayına Al</button>
        </div>

        <!-- Destek -->
        <div id="destek" style="display:none;">
            <h2>Destek & Şikayet</h2>
            <input type="text" id="yetkili" placeholder="Yetkili İsmi">
            <textarea id="neden" placeholder="Şikayet/Destek Nedeni"></textarea>
            <select id="puan"><option value="1">1 Puan</option><option value="5">5 Puan</option></select>
            <button class="btn-green" onclick="submitDestek()">Gönder</button>
        </div>
    </div>

    <!-- Firebase ve JavaScript -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Senin Firebase Config Kodların
        const firebaseConfig = {
            apiKey: "AIzaSyC4zsx3SS7vBEUB9KnWUdnfB9ovKCSJ320",
            authDomain: "ilanpazari-8d8c1.firebaseapp.com",
            projectId: "ilanpazari-8d8c1",
            storageBucket: "ilanpazari-8d8c1.firebasestorage.app",
            messagingSenderId: "684347969650",
            appId: "1:684347969650:web:55953647ec2da24aa932eb"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // Sayfa Değiştirme
        window.show = (id) => {
            document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        // İlan Ekleme
        window.submitIlan = async () => {
            await addDoc(collection(db, "ilanlar"), {
                isim: document.getElementById('isim').value,
                tel: document.getElementById('tel').value,
                aciklama: document.getElementById('aciklama').value
            });
            alert("İlanınız başarıyla eklendi!");
        };

        // Destek Ekleme
        window.submitDestek = async () => {
            await addDoc(collection(db, "destek"), {
                yetkili: document.getElementById('yetkili').value,
                neden: document.getElementById('neden').value,
                puan: document.getElementById('puan').value
            });
            alert("Destek talebiniz ulaştı!");
        };

        // İlanları Anlık Listeleme
        onSnapshot(collection(db, "ilanlar"), (snap) => {
            let html = "";
            snap.forEach(d => {
                let data = d.data();
                html += `<div class="card"><h3>${data.isim}</h3><p>${data.aciklama}</p><button onclick="navigator.clipboard.writeText('${data.tel}')">Yetkili Numarasını Kopyala</button></div>`;
            });
            document.getElementById('ilanListesi').innerHTML = html;
        });
    </script>
</body>
</html>
