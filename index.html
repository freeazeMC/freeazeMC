<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeGuard - OSINT & Güvenlik Platformu</title>
    
    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3581301294764999" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Banner Ad -->
    <div class="ad-banner">
        <ins class="adsbygoogle"
             style="display:block; text-align:center;"
             data-ad-client="ca-pub-3581301294764999"
             data-ad-slot="YOUR_AD_SLOT_1"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
    </div>

    <nav class="navbar">
        <div class="logo">NodeGuard</div>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#" class="active">OSINT Tarama</a>
            <a href="#">Raporlar</a>
            <a href="#">IP Logger</a>
            <a href="#">Ekip (234)</a>
        </div>
        <div class="status">14 Ülke • VPN Aktif</div>
    </nav>

    <div class="container">
        <h1 class="main-title">OSINT & Site Analiz Sistemi</h1>
        <p class="subtitle">Hedef site hakkında detaylı istihbarat ve güvenlik analizi</p>

        <div class="search-box">
            <input type="text" id="urlInput" class="url-input" placeholder="https://example.com" value="https://example.com">
            <button onclick="startOSINT()" class="btn-primary">OSINT TARAMASI BAŞLAT</button>
        </div>

        <!-- Second Ad -->
        <div class="ad-banner" style="margin: 25px 0;">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3581301294764999"
                 data-ad-slot="YOUR_AD_SLOT_2"
                 data-ad-format="rectangle"
                 data-full-width-responsive="true"></ins>
        </div>

        <div id="results" class="results">
            <div class="card">
                <h3>Tarama Logu</h3>
                <div id="log" class="log-area"></div>
            </div>

            <div class="card">
                <h3>OSINT Raporu</h3>
                <div id="report" class="report-area"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
