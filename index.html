<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NodeGuard Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background: #fff; }
        .loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #0056b3; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav { background: #0056b3; padding: 15px; display: flex; justify-content: center; gap: 20px; }
        .nav button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #content { max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; }
        input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button.submit { background: #0056b3; color: white; border: none; cursor: pointer; }
        footer { margin-top: 50px; font-size: 12px; color: #777; }
        #logo { width: 100px; }
    </style>
</head>
<body>

    <div id="loader-start" class="loader-screen">
        <div class="spinner"></div>
        <div id="info-text">NodeGuard Shop'a hoş geldiniz...</div>
    </div>

    <div id="loader-nav" class="loader-screen" style="display:none;">
        <div class="spinner"></div>
        <p>Yükleniyor...</p>
    </div>

    <div class="nav">
        <button onclick="showPage('siparis')">Sipariş Formu</button>
        <button onclick="showPage('degerlendirme')">Değerlendirme Formu</button>
    </div>

    <div id="content">
        <div id="siparis" class="page">
            <h1>Sipariş Formu</h1>
            <form id="formSiparis">
                <input type="text" id="tel" placeholder="Telefon Numarası" required>
                <input type="text" id="app" placeholder="Uygulama Adı" required>
                <textarea id="istek" placeholder="Nasıl bir hesap istiyorsunuz?"></textarea>
                <button type="submit" class="submit">GÖNDER</button>
            </form>
        </div>

        <div id="degerlendirme" class="page" style="display:none;">
            <h1>Değerlendirme</h1>
            <form id="formDegerlendirme">
                <input type="text" id="yetkili" placeholder="Yetkili İsmi" required>
                <input type="number" id="puan" min="1" max="5" placeholder="Puan (1-5)">
                <button type="submit" class="submit">GÖNDER</button>
            </form>
        </div>
    </div>

    <footer>
        <img src="https://cdn.phototourl.com/free/2026-07-12-5f4aade5-db90-45c8-92e5-25769bc41829.png" alt="Güvenli İnternet" id="logo">
        <p>Kişisel bilgileriniz RXC DEVELOPER tarafından korunmaktadır.</p>
    </footer>

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1525934429120499875/A8cbspugQnvj3J8oUqt3ppz7neNhSgQJjaXcGCPf9xvZrisuQ5hU-_LzUYAytPAFJ6kb";
        
        const infos = ["NodeGuard en çok tercih edilen ve 4.5 puanlı bir satıcıdır", "Sitede aktif olarak 103 satıcı vardır", "Yetkililer sadece 15 dakikada hizmet verir", "Site sadece 1 kişi tarafından açılmıştır", "Aktif olarak 44 yetkili bulunur"];
        let i = 0;
        const infoEl = document.getElementById('info-text');
        
        const interval = setInterval(() => { infoEl.innerText = infos[i++ % infos.length]; }, 1400);
        setTimeout(() => { document.getElementById('loader-start').style.display = 'none'; clearInterval(interval); }, 7000);

        function showPage(pageId) {
            document.getElementById('loader-nav').style.display = 'flex';
            setTimeout(() => {
                document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
                document.getElementById(pageId).style.display = 'block';
                document.getElementById('loader-nav').style.display = 'none';
            }, 3000);
        }

        function sendWebhook(data) {
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => alert('Mesaj başarıyla iletildi!'));
        }

        document.getElementById('formSiparis').onsubmit = (e) => { 
            e.preventDefault(); 
            sendWebhook({ content: "Yeni Sipariş: " + document.getElementById('tel').value + " - " + document.getElementById('istek').value });
        };

        document.getElementById('formDegerlendirme').onsubmit = (e) => { 
            e.preventDefault(); 
            sendWebhook({ content: "Yeni Değerlendirme: " + document.getElementById('yetkili').value + " Puan: " + document.getElementById('puan').value });
        };
    </script>
</body>
</html>
