<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ENBABA - Finans & Skor Terminali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <img src="logo.png" alt="ENBABA Logo" style="height: 60px; vertical-align: middle;">
        ENBABA TERMINAL 👑
    </div>

    <div class="dashboard">
        <div class="card" id="ai-kart">
            <h3>🤖 AI ANALİZİ</h3>
            <p id="ai-tavsiye">Analiz ediliyor...</p>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Dolar/TL</h3>
            <p id="dolar">34.20 <span class="up">▲</span></p>
        </div>
        <div class="card">
            <h3>Altın (Gram)</h3>
            <p id="altin">2.510 <span class="up">▲</span></p>
        </div>
        <div class="card">
            <h3>Sayısal Loto Önerisi</h3>
            <p>03 - 12 - 25 - 34 - 41 - 49</p>
        </div>
    </div>

    <div class="card" style="margin: 20px;">
        <h3>⚽ MAÇ SONUÇLARI</h3>
        <div id="mac-listesi">
            <p>GS 2 - 1 FB <span class="down">(BİTTİ)</span></p>
            <p>BJK 0 - 0 TS <span class="down">(BİTTİ)</span></p>
        </div>
    </div>

    <img src="robot.png" id="robot" alt="ENBABA Boss">

    <script src="script.js"></script>
</body>
</html>
