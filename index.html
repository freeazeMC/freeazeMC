<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NodeGuard | İlan & Destek</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; }
        .nav { background: #1e1e1e; padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .card { background: #252525; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #333; border: none; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn-green { background: #27ae60; width: 100%; padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #mesajlar { height: 200px; background: #1a1a1a; overflow-y: scroll; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="show('ilanlar')">Pazar</button>
        <button onclick="show('ekle')">İlan Ekle</button>
        <button onclick="show('destek')">Canlı Destek</button>
    </div>

    <div class="container">
        <!-- İlanlar -->
        <div id="ilanlar">
            <div id="ilanListesi"></div>
        </div>

        <!-- İlan Ekleme -->
        <div id="ekle" style="display:none;">
            <input type="text" id="isim" placeholder="İlan Başlığı">
            <input type="text" id="tel" placeholder="WhatsApp Numarası">
            <textarea id="aciklama" placeholder="Detaylar"></textarea>
            <button class="btn-green" onclick="submitIlan()">İlanı Yayınla</button>
        </div>

        <!-- Canlı Destek -->
        <div id="destek" style="display:none;">
            <div id="mesajlar"></div>
            <input type="text" id="mesajInput" placeholder="Mesajını yaz...">
            <button class="btn-green" onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4zsx3SS7vBEUB9KnWUdnfB9ovKCSJ320",
            authDomain: "ilanpazari-8d8c1.firebaseapp.com",
            projectId: "ilanpazari-8d8c1",
            storageBucket: "ilanpazari-8d8c1.firebasestorage.app",
            messagingSenderId: "684347969650",
            appId: "1:684347969650:web:55953647ec2da24aa932eb"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        window.show = (id) => {
            document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        window.submitIlan = async () => {
            await addDoc(collection(db, "ilanlar"), {
                isim: document.getElementById('isim').value,
                tel: document.getElementById('tel').value,
                aciklama: document.getElementById('aciklama').value
            });
            alert("İlan eklendi!");
        };

        window.mesajGonder = async () => {
            const msg = document.getElementById('mesajInput').value;
            if(!msg) return;
            await addDoc(collection(db, "destek_mesajlari"), { mesaj: msg, zaman: new Date().getTime() });
            document.getElementById('mesajInput').value = "";
        };

        onSnapshot(collection(db, "ilanlar"), (snap) => {
            let html = "";
            snap.forEach(d => { let data = d.data(); html += `<div class="card"><h3>${data.isim}</h3><p>${data.aciklama}</p><button class="btn-green" onclick="navigator.clipboard.writeText('${data.tel}')">Numarayı Kopyala</button></div>`; });
            document.getElementById('ilanListesi').innerHTML = html;
        });

        onSnapshot(query(collection(db, "destek_mesajlari"), orderBy("zaman")), (snap) => {
            let chatHtml = "";
            snap.forEach(d => { chatHtml += `<p style="border-bottom:1px solid #333">💬 ${d.data().mesaj}</p>`; });
            document.getElementById('mesajlar').innerHTML = chatHtml;
        });
    </script>
</body>
</html>
